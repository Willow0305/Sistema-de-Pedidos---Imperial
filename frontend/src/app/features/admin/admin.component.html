<app-imperial-header />

<main class="app-shell">
  <section class="page-title">
    <p class="eyebrow">Painel administrativo</p>
    <h1>Operação Imperial</h1>
  </section>

  <section class="action-grid">
    <a class="card-imperial action-card" routerLink="/caixa">
      <i-lucide name="clipboard-list" aria-hidden="true"></i-lucide>
      <strong>Caixa</strong>
      <span>Criar pedidos e acompanhar fichas.</span>
    </a>
    <a class="card-imperial action-card" routerLink="/producao">
      <i-lucide name="chef-hat" aria-hidden="true"></i-lucide>
      <strong>Produção</strong>
      <span>Atualizar status em tempo real.</span>
    </a>
    <a class="card-imperial action-card" routerLink="/usuarios">
      <i-lucide name="users" aria-hidden="true"></i-lucide>
      <strong>Usuários</strong>
      <span>Adicionar, editar e excluir acessos internos.</span>
    </a>
    <a class="card-imperial action-card" routerLink="/configuracoes">
      <i-lucide name="settings" aria-hidden="true"></i-lucide>
      <strong>Configurações</strong>
      <span>Fichas, mensagens e permissões.</span>
    </a>
    <a class="card-imperial action-card" routerLink="/qrcodes">
      <i-lucide name="qr-code" aria-hidden="true"></i-lucide>
      <strong>QR Codes</strong>
      <span>Cliente público e acesso interno.</span>
    </a>
  </section>
</main>
