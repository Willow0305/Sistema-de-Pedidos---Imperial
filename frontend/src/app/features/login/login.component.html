<main class="public-shell login-shell">
  <section class="cliente-hero">
    <img class="logo-xl" src="assets/logo_imperial.png" alt="Escudo Imperial" />
    <p class="eyebrow">Área interna</p>
    <h1>Sistema de Pedidos Imperial</h1>
    <p>Acesso exclusivo para equipe de caixa, produção e administração.</p>
  </section>

  <form class="card-imperial consulta-card login-card" (ngSubmit)="entrar()">
    <label for="username">Usuário</label>
    <input
      id="username"
      name="username"
      autocomplete="username"
      [(ngModel)]="username"
      required
    />

    <label for="password">Senha</label>
    <input
      id="password"
      name="password"
      type="password"
      autocomplete="current-password"
      [(ngModel)]="password"
      required
    />

    <button type="submit" class="btn-imperial" [disabled]="carregando">
      {{ carregando ? 'Entrando...' : 'Entrar' }}
    </button>
    <p class="form-error" *ngIf="erro">{{ erro }}</p>
  </form>
</main>
