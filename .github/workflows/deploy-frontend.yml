name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Configure production API URLs
        working-directory: frontend
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          WS_BASE_URL: ${{ secrets.WS_BASE_URL }}
        run: |
          if [ -z "$API_BASE_URL" ] || [ -z "$WS_BASE_URL" ]; then
            echo "Configure os secrets API_BASE_URL e WS_BASE_URL antes do deploy."
            exit 1
          fi

          cat > src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            apiUrl: '$API_BASE_URL',
            wsUrl: '$WS_BASE_URL',
          };
          EOF

      - name: Detect GitHub Pages base href
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "BASE_HREF=/" >> "$GITHUB_ENV"
          else
            echo "BASE_HREF=/$REPO_NAME/" >> "$GITHUB_ENV"
          fi

      - name: Build Angular app
        working-directory: frontend
        run: npx ng build --configuration production --base-href "$BASE_HREF"

      - name: Add SPA fallback
        working-directory: frontend
        run: cp dist/sistema-pedidos-imperial/browser/index.html dist/sistema-pedidos-imperial/browser/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/sistema-pedidos-imperial/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
