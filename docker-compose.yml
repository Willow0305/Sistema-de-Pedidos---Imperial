services:
  postgres:
    image: postgres:16
    container_name: imperial_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: imperial
      POSTGRES_USER: djangodb
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

